# =============================================================================
# GitHub Actions CI — Azure Community Health Platform (Bicep)
# Validates, security-scans, builds ARM template, and uploads artifact
# =============================================================================

name: CI — Validate & Build Bicep

on:
  push:
    branches: [master, main]
    paths: ['infra/**']
  pull_request:
    branches: [master, main]
    paths: ['infra/**']

permissions:
  contents: read
  security-events: write

env:
  ARTIFACT_NAME: bicep-infra

jobs:
  # ────────────────────────────────────────────
  # Job 1 — Lint & Validate Bicep
  # ────────────────────────────────────────────
  validate:
    name: 🔍 Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bicep CLI
        run: |
          az bicep install
          az bicep version

      - name: Lint all Bicep files
        run: |
          find infra -name '*.bicep' -not -name '*.bicepparam' | while read f; do
            echo "Linting: $f"
            az bicep lint --file "$f" --diagnostics-format sarif 2>/dev/null || \
            az bicep build --file "$f" --stdout > /dev/null
          done
          echo "✅ All Bicep files passed linting"

      - name: Compile Bicep → ARM (syntax check)
        run: |
          az bicep build --file infra/main.bicep --outfile /tmp/main.json
          echo "✅ Bicep compiled successfully"

  # ────────────────────────────────────────────
  # Job 2 — Security Scan
  # ────────────────────────────────────────────
  security-scan:
    name: 🛡️ Security Scan
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra
          framework: bicep
          soft_fail: true
          output_format: cli

      - name: Detect hardcoded secrets
        run: |
          pip install detect-secrets
          detect-secrets scan --all-files --exclude-files '\.git/.*' > .secrets-baseline.json
          cat .secrets-baseline.json
          echo "✅ Secret scan complete"

  # ────────────────────────────────────────────
  # Job 3 — Build & Publish Artifact
  # ────────────────────────────────────────────
  build:
    name: 📦 Build Artifact
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - uses: actions/checkout@v4

      - name: Compile Bicep to ARM JSON
        run: |
          mkdir -p artifact/arm artifact/parameters
          az bicep build --file infra/main.bicep --outfile artifact/arm/main.json
          cp infra/parameters/*.bicepparam artifact/parameters/

      - name: Generate manifest
        run: |
          cat > artifact/manifest.json << EOF
          {
            "project": "azure-community-health-platform",
            "version": "${{ github.run_number }}",
            "commit": "${{ github.sha }}",
            "branch": "${{ github.ref_name }}",
            "buildDate": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}-${{ github.run_number }}
          path: artifact/
          retention-days: 30
