# =============================================================================
# GitHub Actions CD — Azure Community Health Platform (Bicep)
# Downloads artifact and deploys infrastructure to Azure
# =============================================================================

name: CD — Deploy to Azure

on:
  workflow_run:
    workflows: ["CI — Validate & Build Bicep"]
    types: [completed]
    branches: [master, main]

permissions:
  contents: read
  id-token: write  # OIDC for Azure login

env:
  ARTIFACT_NAME: bicep-infra

jobs:
  # ────────────────────────────────────────────
  # Job 1 — Deploy to DEV
  # ────────────────────────────────────────────
  deploy-dev:
    name: 🚀 Deploy — DEV
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Download CI artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}-${{ github.event.workflow_run.run_number }}
          path: artifact/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep — DEV
        uses: azure/arm-deploy@v2
        with:
          scope: resourcegroup
          resourceGroupName: rg-community-health-dev
          template: artifact/arm/main.json
          parameters: artifact/parameters/dev.bicepparam
          deploymentName: community-health-dev-${{ github.run_number }}
          failOnStdErr: false

      - name: Smoke Test — DEV
        run: |
          echo "✅ DEV deployment complete"
          az resource list --resource-group rg-community-health-dev --output table

  # ────────────────────────────────────────────
  # Job 2 — Deploy to STAGING
  # ────────────────────────────────────────────
  deploy-staging:
    name: 🚀 Deploy — STAGING
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Download CI artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}-${{ github.event.workflow_run.run_number }}
          path: artifact/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep — STAGING
        uses: azure/arm-deploy@v2
        with:
          scope: resourcegroup
          resourceGroupName: rg-community-health-staging
          template: artifact/arm/main.json
          parameters: artifact/parameters/staging.bicepparam
          deploymentName: community-health-staging-${{ github.run_number }}
          failOnStdErr: false

  # ────────────────────────────────────────────
  # Job 3 — Deploy to PRODUCTION (manual approval)
  # ────────────────────────────────────────────
  deploy-prod:
    name: 🟢 Deploy — PRODUCTION
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production  # Requires manual approval
    steps:
      - uses: actions/checkout@v4

      - name: Download CI artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}-${{ github.event.workflow_run.run_number }}
          path: artifact/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep — PROD
        uses: azure/arm-deploy@v2
        with:
          scope: resourcegroup
          resourceGroupName: rg-community-health-prod
          template: artifact/arm/main.json
          parameters: artifact/parameters/prod.bicepparam
          deploymentName: community-health-prod-${{ github.run_number }}
          failOnStdErr: false

      - name: Post-deploy validation
        run: |
          echo "✅ PRODUCTION deployment complete"
          az resource list --resource-group rg-community-health-prod --output table
